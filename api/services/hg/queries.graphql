query GetRepo($rid: ID!) {
  repository(rid: $rid) {
    id
    rid
    name
    description
    visibility
  }
}

mutation CreateUserWebhook(
  $payload: String!
  $url: String!,
) {
  webhook: createUserWebhook(config: {
    url: $url,
    events: [
      REPO_UPDATE,
      REPO_DELETED,
    ],
    query: $payload
  }) { id }
}

mutation DeleteUserWebhook($id: Int!) {
  deleteUserWebhook(id: $id) { id }
}

# Versioned, see HG_WEBHOOK_VERSION in hubsrht/blueprints/sources.py and
# contrib/ensure-webhooks
query EventWebhook {
  webhook {
    __typename
    uuid
    event
    date

    ... on RepositoryEvent {
      repository {
        id
        rid
        name
        description
        visibility
      }
    }
  }
}
