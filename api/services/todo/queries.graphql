query GetTracker($rid: ID!) {
  tracker(rid: $rid) {
    __typename
    ... trackerDetails
  }
}

fragment trackerDetails on Tracker {
  id
  rid
  name
  description
  visibility
  updated

  defaultACL {
    browse
  }

  owner {
    __typename
    canonicalName
  }
}

mutation CreateUserWebhook(
  $payload: String!
  $url: String!,
) {
  webhook: createUserWebhook(config: {
    url: $url,
    events: [
      TRACKER_UPDATE
      TRACKER_DELETED
    ],
    query: $payload
  }) { id }
}

mutation DeleteUserWebhook($id: Int!) {
  deleteUserWebhook(id: $id) { id }
}

mutation CreateTrackerWebhook(
  $trackerId: Int!,
  $payload: String!,
  $url: String!,
) {
  webhook: createTrackerWebhook(trackerId: $trackerId, config: {
    url: $url,
    events: [
      TICKET_CREATED,
      EVENT_CREATED,
    ],
    query: $payload,
  }) { id }
}

mutation DeleteTrackerWebhook($id: Int!) {
  deleteTrackerWebhook(id: $id) { id }
}

# Versioned, see TODO_WEBHOOK_VERSION in hubsrht/blueprints/trackers.py and
# contrib/ensure-webhooks
query EventWebhook {
  webhook {
    __typename
    uuid
    event
    date

    ... on TrackerEvent {
      tracker {
        id
        name
        description
        visibility
      }
    }

    ... on TicketEvent {
      ticket {
        id
        subject

        tracker {
          id
          name
        }

        submitter {
          __typename
          canonicalName

          ... on User {
            username
          }

          ... on EmailAddress {
            mailbox
            name
          }

          ... on ExternalUser {
            externalId
            externalUrl
          }
        }
      }
    }

    ... on EventCreated {
      newEvent {
        ticket {
          id
          subject

          tracker {
            id
          }
        }

        changes {
          __typename
          eventType

          ... on Comment {
            author {
              __typename
              canonicalName

              ... on User {
                username
              }

              ... on EmailAddress {
                mailbox
                name
              }

              ... on ExternalUser {
                externalId
                externalUrl
              }
            }
          }
        }
      }
    }
  }
}
