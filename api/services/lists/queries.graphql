query GetList($rid: ID!) {
  mailingList: list(rid: $rid) {
    ... listDetails
  }
}

fragment listDetails on MailingList {
  id
  rid
  name
  description
  visibility
  defaultACL {
    browse
  }
  owner {
    canonicalName
  }
}

mutation CreateUserWebhook(
  $payload: String!
  $url: String!,
) {
  webhook: createUserWebhook(config: {
    url: $url,
    events: [
      LIST_UPDATED,
      LIST_DELETED,
    ],
    query: $payload
  }) { id }
}

mutation DeleteUserWebhook($id: Int!) {
  deleteUserWebhook(id: $id) { id }
}

mutation CreateListWebhook(
  $listId: Int!,
  $url: String!,
  $payload: String!
) {
  webhook: createMailingListWebhook(
    listId: $listId,
    config: {
      url: $url,
      query: $payload,
      events: [
        EMAIL_RECEIVED,
        PATCHSET_RECEIVED,
      ],
    },
  ) { id }
}

mutation DeleteListWebhook($id: Int!) {
  deleteMailingListWebhook(id: $id) { id }
}

# Versioned, see LIST_WEBHOOK_VERSION in hubsrht/blueprints/mailing_lists.py
# and contrib/ensure-webhooks
query EventWebhook {
  webhook {
    __typename
    uuid
    event
    date

    ... on MailingListEvent {
      mailingList: list {
        id
        rid
        name
        description
        visibility
      }
    }

    ... on EmailEvent {
      email {
        id
        mailingList: list { id }
        messageID
        subject

        sender {
          __typename
          canonicalName

          ... on User {
            username
          }

          ... on Mailbox {
            name
          }
        }

        patch {
          trailers {
            name
            value
          }
        }

        patchset {
          id
        }
      }
    }

    ... on PatchsetEvent {
      patchset {
        id
        subject
        prefix
        version
        mailingList: list { id }

        thread {
          root {
            messageID
            reply_to: header(want: "In-Reply-To")
          }
        }

        patches {
          results {
            subject
            messageID

            patchset {
              id
            }

            sender {
              __typename
              canonicalName

              ... on User {
                username
              }

              ... on Mailbox {
                name
              }
            }

            patch {
              prefix

              trailers {
                name
                value
              }
            }
          }
        }

        submitter {
          __typename
          ... on User {
            name: canonicalName
            address: email
          }

          ... on Mailbox {
            name
            address
          }
        }
      }
    }
  }
}
