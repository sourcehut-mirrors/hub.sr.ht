query GetRepo($rid: ID!) {
  repository(rid: $rid) {
    id
    rid
    name
    description
    visibility
    owner {
      canonicalName
    }
  }
}

mutation CreateUserWebhook(
  $payload: String!
  $url: String!,
) {
  webhook: createUserWebhook(config: {
    url: $url,
    events: [
      REPO_UPDATE,
      REPO_DELETED,
    ],
    query: $payload
  }) { id }
}

mutation DeleteUserWebhook($id: Int!) {
  deleteUserWebhook(id: $id) { id }
}

mutation CreateRepoWebhook(
  $repoID: Int!,
  $payload: String!,
  $url: String!,
) {
  webhook: createGitWebhook(config: {
    repositoryID: $repoID,
    url: $url,
    query: $payload,
    events: [GIT_POST_RECEIVE],
  }) { id }
}

mutation DeleteRepoWebhook($id: Int!) {
  deleteGitWebhook(id: $id) { id }
}

# Versioned, see GIT_WEBHOOK_VERSION in hubsrht/blueprints/sources.py and
# contrib/ensure-webhooks
query EventWebhook {
  webhook {
    __typename
    uuid
    event
    date

    ... on RepositoryEvent {
      repository {
        id
        rid
        name
        description
        visibility
      }
    }

    ... on GitEvent {
      pusher {
        __typename
        canonicalName

        ... on User {
          username
        }
      }

      updates {
        old {
          __typename
          id
        }

        new {
          __typename
          id
          shortId

          ... on Commit {
            message
          }
          ... on Tag {
            message
          }
        }

        log {
          results {
            id
            message
            author {
              name
            }
          }
        }
      }
    }
  }
}
