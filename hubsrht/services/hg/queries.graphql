query GetRepos($cursor: Cursor) {
  me {
    repositories(cursor: $cursor) {
      results {
        id
        rid
        name
        updated
        owner {
          canonicalName
        }
      }
      cursor
    }
  }
}

query GetRepo($rid: ID!) {
  repository(rid: $rid) {
    id
    rid
    name
    description
    visibility
  }
}

query GetReadme($username: String!, $repoName: String!) {
  user(username: $username) {
    repository(name: $repoName) {
      html: readme
      md: cat(path: "README.md")
      markdown: cat(path: "README.markdown")
      plaintext: cat(path: "README")
    }
  }
}

mutation CreateRepo(
  $name: String!,
  $visibility: Visibility!,
  $description: String,
) {
  repository: createRepository(
    name: $name,
    description: $description,
    visibility: $visibility,
  ) {
    id
    rid
    name
    description
    visibility
  }
}

mutation DeleteRepo($repo_id: Int!) {
  deleteRepository(id: $repo_id) { id }
}

mutation CreateUserWebhook(
  $payload: String!
  $url: String!,
) {
  webhook: createUserWebhook(config: {
    url: $url,
    events: [
      REPO_UPDATE,
      REPO_DELETED,
    ],
    query: $payload
  }) { id }
}

mutation DeleteUserWebhook($id: Int!) {
  deleteUserWebhook(id: $id) { id }
}

# Versioned, see HG_WEBHOOK_VERSION in hubsrht/blueprints/sources.py and
# contrib/ensure-webhooks
query EventWebhook {
  webhook {
    uuid
    event
    date

    ... on RepositoryEvent {
      repository {
        id
        rid
        name
        description
        visibility
      }
    }
  }
}
