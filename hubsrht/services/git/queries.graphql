query GetRepos($cursor: Cursor) {
  me {
    repositories(cursor: $cursor) {
      results {
        id
        rid
        name
        updated
        owner {
          canonicalName
        }
      }
      cursor
    }
  }
}

query GetRepo($rid: ID!) {
  repository(rid: $rid) {
    id
    rid
    name
    description
    visibility
  }
}

query GetReadme($username: String!, $repoName: String!) {
  user(username: $username) {
    repository(name: $repoName) {
      html: readme
      md: path(path: "README.md") { ...textData }
      markdown: path(path: "README.markdown") { ...textData }
      plaintext: path(path: "README") { ...textData }
    }
  }
}

fragment textData on TreeEntry {
  object_: object {
    __typename
    ... on TextBlob {
      text
    }
  }
}

query GetManifests($username: String!, $repo_name: String!) {
  user(username: $username) {
    repository(name: $repo_name) {
      name
      visibility

      multiple: path(path:".builds") {
        object_: object {
          ... on Tree {
            entries {
              results {
                name
                object_: object { ... on TextBlob { text } }
              }
            }
          }
        }
      },
      singleYML: path(path:".build.yml") {
        object_: object{
          ... on TextBlob { text }
        }
      },
      singleYAML: path(path:".build.yaml") {
        object_: object {
          ... on TextBlob { text }
        }
      }
    }
  }
}

mutation CreateRepo(
  $name: String!,
  $visibility: Visibility!,
  $description: String,
) {
  repository: createRepository(
    name: $name,
    description: $description,
    visibility: $visibility,
  ) {
    id
    rid
    name
    description
    visibility
  }
}

mutation DeleteRepo($repo_id: Int!) {
  deleteRepository(id: $repo_id) { id }
}

mutation CreateUserWebhook(
  $payload: String!
  $url: String!,
) {
  webhook: createUserWebhook(config: {
    url: $url,
    events: [
      REPO_UPDATE,
      REPO_DELETED,
    ],
    query: $payload
  }) { id }
}

mutation DeleteUserWebhook($id: Int!) {
  deleteUserWebhook(id: $id) { id }
}

mutation CreateRepoWebhook(
  $repoID: Int!,
  $payload: String!,
  $url: String!,
) {
  webhook: createGitWebhook(config: {
    repositoryID: $repoID,
    url: $url,
    query: $payload,
    events: [GIT_POST_RECEIVE],
  }) { id }
}

mutation DeleteRepoWebhook($id: Int!) {
  deleteGitWebhook(id: $id) { id }
}

# Versioned, see GIT_WEBHOOK_VERSION in hubsrht/blueprints/sources.py and
# contrib/ensure-webhooks
query EventWebhook {
  webhook {
    uuid
    event
    date

    ... on RepositoryEvent {
      repository {
        id
        rid
        name
        description
        visibility
      }
    }

    ... on GitEvent {
      pusher {
        canonicalName

        ... on User {
          username
        }
      }

      updates {
        old {
          id
        }

        new {
          id
          shortId

          ... on Commit {
            message
          }
          ... on Tag {
            message
          }
        }

        log {
          results {
            id
            message
            author {
              name
            }
          }
        }
      }
    }
  }
}
